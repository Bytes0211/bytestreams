name: Deploy

# Deploys the marketing site at bytestreams.ai, served by the existing
# Cloudflare Worker with Static Assets (name declared in wrangler.toml).
# Triggered on pushes to main that touch production files. Manual runs
# are always allowed via workflow_dispatch.
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN   — Workers edit permission on the bytestreams.ai zone
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'site/**'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy (bytestreams.ai)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Sass
        run: npm run sass

      - name: Stage deploy artifact
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public
          # Ship only what the browser needs
          cp *.html public/
          cp -r assets dist js public/
          # Fail fast if required legal pages are missing from the artifact.
          test -f public/cookies.html
          test -f public/sms-terms.html
          # Strip sourcemaps from production (optional — remove if you want them)
          find public/dist -name '*.map' -delete || true

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml

# ByteStreams — marketing site (bytestreams.ai, www.bytestreams.ai)
# Cloudflare Workers with Static Assets
# Docs: https://developers.cloudflare.com/workers/static-assets/
#
# The live Worker that serves bytestreams.ai was originally created via
# the Cloudflare dashboard's "Upload assets" flow (which generated the
# three-part random name). Keeping that exact name here so
# `wrangler deploy` updates the same Worker rather than creating a
# duplicate, and the existing custom domain bindings
# (`bytestreams.ai`, `www.bytestreams.ai`) stay intact.

name = "ancient-mountain-5dad"
main = "worker.js"
compatibility_date = "2026-04-21"
compatibility_flags = []

[vars]
CONTACT_EMAIL = "hello@bytestreams.ai"

# Assets directory is the `public/` folder, which the GitHub Actions
# workflow builds fresh on every deploy (copying only production files
# out of the repo root). That way source files (sass/, docs/, node_modules/,
# package.json, etc.) never ship to the Worker.
[assets]
directory = "./public"
# not_found_handling = "none" — this is a static multi-page site, not an
# SPA, so unknown paths should return 404 rather than rewriting to
# /index.html.
not_found_handling = "none"

# Keep Worker observability settings in source control so dashboard and
# CI/CD deployments stay consistent.
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false

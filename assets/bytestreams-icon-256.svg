<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#06B6D4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="24" fill="url(#bgGrad)"/>
  <ellipse cx="128" cy="120" rx="90" ry="70" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Wavy Streams -->
  <path d="M 30 95 Q 55 80, 80 95 Q 105 110, 130 95 Q 155 80, 180 95"
        fill="none" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M 25 120 Q 50 105, 75 120 Q 100 135, 125 120 Q 150 105, 175 120"
        fill="none" stroke="#06B6D4" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M 30 145 Q 55 130, 80 145 Q 105 160, 130 145 Q 155 130, 180 145"
        fill="none" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Secondary thin streams -->
  <path d="M 40 85 Q 65 72, 90 85 Q 115 98, 140 85"
        fill="none" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M 35 155 Q 60 142, 85 155 Q 110 168, 135 155"
        fill="none" stroke="#10B981" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- Data Particles — Squares -->
  <rect x="42" y="78" width="5" height="5" rx="1" fill="#F59E0B" opacity="0.9" transform="rotate(15 44 80)"/>
  <rect x="88" y="100" width="4" height="4" rx="1" fill="#2563EB" opacity="0.8" transform="rotate(-10 90 102)"/>
  <rect x="62" y="132" width="5" height="5" rx="1" fill="#06B6D4" opacity="0.85" transform="rotate(25 64 134)"/>
  <rect x="110" y="88" width="3.5" height="3.5" rx="0.5" fill="#F59E0B" opacity="0.7" transform="rotate(40 111 89)"/>
  <rect x="145" y="135" width="4" height="4" rx="1" fill="#10B981" opacity="0.75" transform="rotate(-20 147 137)"/>
  <rect x="38" y="148" width="3" height="3" rx="0.5" fill="#3B82F6" opacity="0.6"/>
  <rect x="155" y="92" width="3.5" height="3.5" rx="0.5" fill="#06B6D4" opacity="0.65" transform="rotate(30 156 93)"/>

  <!-- Data Particles — Circles -->
  <circle cx="55" cy="88" r="2.5" fill="#3B82F6" opacity="0.85"/>
  <circle cx="75" cy="112" r="3" fill="#F59E0B" opacity="0.9"/>
  <circle cx="100" cy="78" r="2" fill="#10B981" opacity="0.7"/>
  <circle cx="120" cy="140" r="2.5" fill="#2563EB" opacity="0.8"/>
  <circle cx="48" cy="118" r="2" fill="#06B6D4" opacity="0.75"/>
  <circle cx="140" cy="110" r="2" fill="#F59E0B" opacity="0.65"/>
  <circle cx="165" cy="100" r="2.5" fill="#3B82F6" opacity="0.7"/>
  <circle cx="95" cy="150" r="1.8" fill="#10B981" opacity="0.6"/>
  <circle cx="68" cy="72" r="1.5" fill="#F59E0B" opacity="0.55"/>
  <circle cx="160" cy="140" r="2" fill="#06B6D4" opacity="0.55"/>

  <!-- Cloud -->
  <g transform="translate(178, 72)" filter="url(#glow)">
    <path d="M 8 32 Q 0 32, 0 25 Q 0 18, 8 18 Q 8 8, 18 8 Q 24 8, 28 12 Q 30 6, 38 6 Q 48 6, 48 16 Q 56 16, 56 24 Q 56 32, 48 32 Z"
          fill="#3B82F6" opacity="0.9"/>
    <path d="M 12 28 Q 6 28, 6 23 Q 6 18, 12 18 Q 14 12, 20 12 Q 24 12, 27 15"
          fill="none" stroke="#60A5FA" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Gear -->
  <g transform="translate(185, 120)" filter="url(#glow)">
    <path d="M 18 4 L 22 4 L 23 8 L 26.5 10 L 30 8.5 L 33 11.5 L 31 15 L 33 18.5 L 37 19 L 37 23 L 33 24 L 31 27.5 L 33 31 L 30 34 L 26.5 32 L 23 34 L 22 38 L 18 38 L 17 34 L 13.5 32 L 10 34 L 7 31 L 9 27.5 L 7 24 L 3 23 L 3 19 L 7 18.5 L 9 15 L 7 11.5 L 10 8.5 L 13.5 10 L 17 8 Z"
          fill="#10B981" opacity="0.9"/>
    <circle cx="20" cy="21" r="6" fill="#0D1117"/>
    <circle cx="20" cy="21" r="4" fill="#10B981" opacity="0.3"/>
  </g>

  <!-- Arrows -->
  <g filter="url(#glow)">
    <line x1="182" y1="90" x2="210" y2="80" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="212,78 205,76 208,83" fill="#3B82F6"/>
  </g>
  <g filter="url(#glow)">
    <line x1="188" y1="165" x2="216" y2="155" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="218,153 211,151 214,158" fill="#3B82F6"/>
  </g>

  <!-- Ambient particles -->
  <circle cx="22" cy="70" r="1.5" fill="#2563EB" opacity="0.3"/>
  <circle cx="172" cy="165" r="1.5" fill="#F59E0B" opacity="0.3"/>
  <circle cx="230" cy="115" r="1" fill="#06B6D4" opacity="0.25"/>
  <rect x="225" y="140" width="2.5" height="2.5" rx="0.5" fill="#10B981" opacity="0.25"/>
  <circle cx="18" cy="160" r="1" fill="#3B82F6" opacity="0.2"/>
  <rect x="145" y="68" width="2" height="2" rx="0.5" fill="#F59E0B" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="128" y="195" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, sans-serif"
        font-size="10" font-weight="600" letter-spacing="0.08em" fill="#8B949E" opacity="0.7">BYTESTREAMS</text>
  <text x="128" y="210" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, sans-serif"
        font-size="6.5" font-weight="400" letter-spacing="0.12em" fill="#484F58" opacity="0.6">SMARTER WORKFLOWS, STRONGER RESULTS</text>

  <!-- Accent lines -->
  <line x1="24" y1="232" x2="72" y2="232" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="184" y1="232" x2="232" y2="232" stroke="#06B6D4" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
</svg>
